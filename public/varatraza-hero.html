<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Varatraza Tech — Agence IA · Antananarivo</title>
<meta name="description" content="Varatraza Tech, agence digitale spécialisée en intelligence artificielle à Antananarivo, Madagascar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:  #0B5FFF;
  --teal:  #00D4AA;
  --navy:  #0A1628;
  --slate: #1A2340;
}

html, body {
  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* ── HERO WRAPPER ── */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 100px 24px 80px;
}

/* ── CANVAS ── */
#heroCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ── ORBS ── */
.orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: orbFloat ease-in-out infinite alternate;
}
.orb-blue {
  width: 520px; height: 520px;
  top: -160px; left: -120px;
  background: radial-gradient(circle at 40% 40%, rgba(11,95,255,.18), transparent 70%);
  animation-duration: 9s;
}
.orb-teal {
  width: 400px; height: 400px;
  bottom: -100px; right: -80px;
  background: radial-gradient(circle at 60% 60%, rgba(0,212,170,.13), transparent 70%);
  animation-duration: 12s;
}
@keyframes orbFloat {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px,-30px) scale(1.08); }
}

/* ── CONTENT ── */
.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
}

/* ── EYEBROW ── */
.eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: .28em;
  color: var(--teal);
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
  opacity: .85;
}
.eyebrow::before, .eyebrow::after {
  content: '';
  display: inline-block;
  width: 28px; height: 1px;
  background: var(--teal);
  opacity: .5;
}

/* ── LOGO ── */
.logo-wrap {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 48px;
  animation: fadeSlideUp .8s ease .1s both;
}
.logo-icon { flex-shrink: 0; }
.logo-text { text-align: left; }
.logo-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.5px;
  line-height: 1;
  display: block;
}
.logo-sub {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  color: var(--teal);
  letter-spacing: .5em;
  margin-top: 3px;
  display: block;
}

/* ── H1 ── */
.hero-title {
  font-size: clamp(34px, 5.5vw, 68px);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -.03em;
  color: #fff;
  margin-bottom: 24px;
  animation: fadeSlideUp .8s ease .25s both;
}
.hero-title em {
  font-style: normal;
  color: var(--teal);
  text-shadow: 0 0 40px rgba(0,212,170,.4), 0 0 80px rgba(0,212,170,.15);
}

/* ── SUBTITLE ── */
.hero-sub {
  font-size: clamp(15px, 2vw, 20px);
  font-weight: 400;
  color: rgba(255,255,255,.55);
  line-height: 1.65;
  max-width: 560px;
  margin: 0 auto 48px;
  animation: fadeSlideUp .8s ease .4s both;
}

/* ── BUTTONS ── */
.btn-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 72px;
  animation: fadeSlideUp .8s ease .55s both;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 16px 36px;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform .25s, box-shadow .25s, background .2s;
  border: none;
  outline: none;
}
.btn-primary {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 4px 24px rgba(11,95,255,.35);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 40px rgba(11,95,255,.55);
}
.btn-secondary {
  background: rgba(255,255,255,.06);
  color: rgba(255,255,255,.75);
  border: 1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(8px);
}
.btn-secondary:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,.1);
  color: #fff;
}

/* ── STATS ── */
.stats {
  border-top: 1px solid rgba(255,255,255,.06);
  padding-top: 40px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  animation: fadeSlideUp .8s ease .7s both;
}
.stat {
  padding: 0 24px;
  text-align: center;
}
.stat + .stat {
  border-left: 1px solid rgba(255,255,255,.07);
}
.stat-value {
  font-family: 'DM Sans', sans-serif;
  font-size: 32px;
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: .16em;
  color: rgba(255,255,255,.35);
  text-transform: uppercase;
}

/* ── SCROLL CUE ── */
.scroll-cue {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: .35;
}
.scroll-cue span {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: .2em;
  color: #fff;
  text-transform: uppercase;
}
.scroll-mouse {
  width: 20px; height: 32px;
  border: 1.5px solid rgba(255,255,255,.4);
  border-radius: 12px;
  display: flex;
  justify-content: center;
  padding-top: 5px;
}
.scroll-dot {
  width: 3px; height: 6px;
  border-radius: 3px;
  background: #fff;
  animation: scrollBounce 1.6s ease-in-out infinite;
}
@keyframes scrollBounce {
  0%,100% { transform: translateY(0); opacity: .6; }
  50% { transform: translateY(8px); opacity: 1; }
}

/* ── ENTRY ANIMATIONS ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .hero { padding: 88px 16px 72px; }
  .logo-name { font-size: 22px; }
  .stats { grid-template-columns: 1fr; gap: 20px; }
  .stat + .stat { border-left: none; border-top: 1px solid rgba(255,255,255,.07); padding-top: 20px; }
  .btn { padding: 14px 28px; font-size: 13px; }
  .eyebrow::before, .eyebrow::after { width: 16px; }
}
</style>
</head>
<body>

<section class="hero">

  <!-- Canvas Network -->
  <canvas id="heroCanvas"></canvas>

  <!-- Floating Orbs -->
  <div class="orb orb-blue"></div>
  <div class="orb orb-teal"></div>

  <!-- Hero Content -->
  <div class="hero-content">



    <!-- H1 -->
    <h1 class="hero-title">
      <em>L'Intelligence Artificielle</em><br>
      au service de votre croissance
    </h1>

    <!-- Subtitle -->
    <p class="hero-sub">
      Stratégie digitale, création &amp; performance — propulsées par l'IA pour transformer votre présence en ligne.
    </p>

    <!-- Buttons -->
    <div class="btn-row">
      <a href="#solutions" class="btn btn-primary">Découvrir nos solutions</a>
      <a href="#realisations" class="btn btn-secondary">Voir nos réalisations &nbsp;→</a>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value">50+</div>
        <div class="stat-label">Projets livrés</div>
      </div>
      <div class="stat">
        <div class="stat-value">7j</div>
        <div class="stat-label">Délai moyen</div>
      </div>
      <div class="stat">
        <div class="stat-value">#1</div>
        <div class="stat-label">Tech Agency · Mada</div>
      </div>
    </div>

  </div><!-- /hero-content -->

  <!-- Scroll cue -->
  <div class="scroll-cue">
    <span>Découvrir</span>
    <div class="scroll-mouse"><div class="scroll-dot"></div></div>
  </div>

</section>

<script>
/* ══════════════════════════════════════════════════
   CANVAS — Réseau de nœuds IA (60 FPS)
══════════════════════════════════════════════════ */
const canvas = document.getElementById('heroCanvas');
const ctx    = canvas.getContext('2d');

const BLUE = '#0B5FFF';
const TEAL = '#00D4AA';
const NODE_COUNT   = 55;
const MAX_DIST     = 140;
const PARTICLE_SPD = 1.2;

let W, H, mouse = { x: -999, y: -999 };
let nodes = [];
let particles = [];

/* ── Node class ── */
class Node {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : (Math.random() > .5 ? -20 : H + 20);
    this.vx = (Math.random() - .5) * .45;
    this.vy = (Math.random() - .5) * .45;
    this.r  = 2.5 + Math.random() * 2.5;
    this.color = Math.random() > .5 ? BLUE : TEAL;
    this.phase = Math.random() * Math.PI * 2;
    this.freq  = .015 + Math.random() * .02;
    this.baseR = this.r;
  }
  update(t) {
    /* Mouse repulsion */
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 90) {
      const force = (90 - dist) / 90 * 1.4;
      this.x += (dx / dist) * force;
      this.y += (dy / dist) * force;
    }
    this.x += this.vx;
    this.y += this.vy;
    /* Pulse */
    this.r = this.baseR + Math.sin(t * this.freq + this.phase) * 1.2;
    /* Wrap */
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;
  }
  draw() {
    /* Glow */
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 3.5);
    g.addColorStop(0, this.color + 'cc');
    g.addColorStop(1, this.color + '00');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    /* Core */
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

/* ── Particle class (signal along edge) ── */
class Particle {
  constructor(a, b) {
    this.a = a; this.b = b; this.t = 0;
    this.color = Math.random() > .5 ? TEAL : BLUE;
  }
  update() { this.t += PARTICLE_SPD / Math.sqrt((this.b.x-this.a.x)**2+(this.b.y-this.a.y)**2); }
  draw() {
    const x = this.a.x + (this.b.x - this.a.x) * this.t;
    const y = this.a.y + (this.b.y - this.a.y) * this.t;
    const g = ctx.createRadialGradient(x, y, 0, x, y, 5);
    g.addColorStop(0, this.color + 'ff');
    g.addColorStop(1, this.color + '00');
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
  isDone() { return this.t >= 1; }
}

/* ── Init ── */
function resize() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}

function init() {
  resize();
  nodes = Array.from({ length: NODE_COUNT }, () => new Node());
  particles = [];
}

/* ── Draw background grid ── */
function drawGrid() {
  const gap = 60;
  ctx.strokeStyle = 'rgba(0,212,170,0.04)';
  ctx.lineWidth = .5;
  for (let x = 0; x < W; x += gap) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gap) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

/* ── Main loop ── */
let frameCount = 0;
function loop(t) {
  frameCount++;
  ctx.clearRect(0, 0, W, H);
  drawGrid();

  /* Update nodes */
  nodes.forEach(n => n.update(frameCount));

  /* Edges + particles */
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < MAX_DIST) {
        const alpha = (1 - d / MAX_DIST) * .45;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(11,95,255,${alpha})`;
        ctx.lineWidth = .8;
        ctx.stroke();
        /* Spawn signal particle occasionally */
        if (frameCount % 90 === 0 && Math.random() < .08) {
          particles.push(new Particle(a, b));
        }
      }
    }
  }

  /* Particles */
  particles = particles.filter(p => { p.update(); p.draw(); return !p.isDone(); });

  /* Draw nodes on top */
  nodes.forEach(n => n.draw());

  requestAnimationFrame(loop);
}

/* ── Events ── */
window.addEventListener('resize', init);
window.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
window.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

/* ── Start ── */
init();
requestAnimationFrame(loop);
</script>

</body>
</html>
